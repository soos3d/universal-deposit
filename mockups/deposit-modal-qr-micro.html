<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deposit Widget - QR-First Micro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* QR-First Micro Widget */
    .widget-micro {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px;
      background: rgba(30, 30, 30, 0.95);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      max-width: 200px;
      width: 100%;
      gap: 10px;
    }

    /* Chain Selector */
    .chain-selector-micro {
      position: relative;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
      border: 1px solid transparent;
    }

    .chain-selector-micro:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(167, 139, 250, 0.3);
    }

    .chain-selector-micro.open {
      border-color: rgba(167, 139, 250, 0.3);
    }

    .chain-icon-micro {
      width: 16px;
      height: 16px;
      border-radius: 50%;
    }

    .chain-name-micro {
      font-size: 11px;
      font-weight: 500;
      color: #aaa;
    }

    .chevron-micro {
      width: 10px;
      height: 10px;
      color: #666;
      transition: transform 0.2s ease;
    }

    .chain-selector-micro.open .chevron-micro {
      transform: rotate(180deg);
    }

    /* Chain Dropdown Micro */
    .chain-dropdown-micro {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: #1e1e1e;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      padding: 4px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      display: none;
      z-index: 100;
    }

    .chain-dropdown-micro.active {
      display: block;
    }

    .chain-option-micro {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .chain-option-micro:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .chain-option-micro.selected {
      background: rgba(167, 139, 250, 0.15);
    }

    .chain-option-micro img {
      width: 14px;
      height: 14px;
      border-radius: 50%;
    }

    .chain-option-micro span {
      font-size: 11px;
      font-weight: 500;
      color: #aaa;
    }

    .chain-option-micro.selected span {
      color: #c4b5fd;
    }

    /* QR Section */
    .qr-micro-wrapper {
      position: relative;
      padding: 8px;
      background: #fff;
      border-radius: 10px;
    }

    .qr-micro-code {
      width: 90px;
      height: 90px;
      display: block;
    }

    .qr-micro-badge {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 22px;
      height: 22px;
      background: #fff;
      border-radius: 5px;
      padding: 3px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
    }

    .qr-micro-badge img {
      width: 100%;
      height: 100%;
      border-radius: 2px;
    }

    /* Address Click to Copy */
    .address-micro {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #888;
      letter-spacing: 0.3px;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 6px;
      transition: all 0.15s ease;
      text-align: center;
      user-select: none;
    }

    .address-micro:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #aaa;
    }

    .address-micro.copied {
      color: #4ade80;
      background: rgba(34, 197, 94, 0.1);
    }

    /* Copy hint */
    .copy-hint {
      font-size: 9px;
      color: #555;
      text-align: center;
      margin-top: -4px;
    }

    /* Demo label */
    .demo-label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      text-align: center;
    }

    .demo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  </style>
</head>
<body>
  <!-- QR-First Micro Widget -->
  <div class="demo-section">
    <div class="demo-label">QR-First Micro Widget</div>
    <div class="widget-micro">
      <!-- Chain Selector -->
      <div class="chain-selector-micro" onclick="toggleMicroDropdown(event)">
        <img class="chain-icon-micro" id="microChainIcon" src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/arbitrum/info/logo.png" alt="Arbitrum">
        <span class="chain-name-micro" id="microChainName">Arbitrum</span>
        <svg class="chevron-micro" viewBox="0 0 12 12" fill="none">
          <path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        
        <!-- Dropdown -->
        <div class="chain-dropdown-micro" id="microChainDropdown">
          <div class="chain-option-micro selected" onclick="selectMicroChain(event, 'Arbitrum', 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/arbitrum/info/logo.png')">
            <img src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/arbitrum/info/logo.png" alt="Arbitrum">
            <span>Arbitrum</span>
          </div>
          <div class="chain-option-micro" onclick="selectMicroChain(event, 'Base', 'https://github.com/base-org/brand-kit/raw/main/logo/in-product/Base_Network_Logo.png')">
            <img src="https://github.com/base-org/brand-kit/raw/main/logo/in-product/Base_Network_Logo.png" alt="Base">
            <span>Base</span>
          </div>
          <div class="chain-option-micro" onclick="selectMicroChain(event, 'Ethereum', 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/info/logo.png')">
            <img src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/info/logo.png" alt="Ethereum">
            <span>Ethereum</span>
          </div>
          <div class="chain-option-micro" onclick="selectMicroChain(event, 'Polygon', 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/polygon/info/logo.png')">
            <img src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/polygon/info/logo.png" alt="Polygon">
            <span>Polygon</span>
          </div>
        </div>
      </div>

      <!-- QR Code -->
      <div class="qr-micro-wrapper">
        <svg class="qr-micro-code" viewBox="0 0 90 90">
          <rect width="90" height="90" fill="#fff"/>
          <g fill="#000">
            <!-- QR pattern -->
            <rect x="8" y="8" width="24" height="24"/>
            <rect x="66" y="8" width="24" height="24"/>
            <rect x="8" y="66" width="24" height="24"/>
            <rect x="12" y="12" width="16" height="16" fill="#fff"/>
            <rect x="70" y="12" width="16" height="16" fill="#fff"/>
            <rect x="12" y="70" width="16" height="16" fill="#fff"/>
            <rect x="16" y="16" width="8" height="8"/>
            <rect x="74" y="16" width="8" height="8"/>
            <rect x="16" y="74" width="8" height="8"/>
            <rect x="40" y="8" width="4" height="4"/>
            <rect x="48" y="12" width="4" height="4"/>
            <rect x="56" y="8" width="4" height="4"/>
            <rect x="8" y="40" width="4" height="4"/>
            <rect x="12" y="48" width="4" height="4"/>
            <rect x="20" y="44" width="4" height="4"/>
            <rect x="40" y="40" width="24" height="24" rx="3"/>
            <rect x="44" y="44" width="16" height="16" rx="2" fill="#fff"/>
            <rect x="66" y="40" width="4" height="4"/>
            <rect x="72" y="48" width="4" height="4"/>
            <rect x="78" y="44" width="4" height="4"/>
            <rect x="40" y="66" width="4" height="4"/>
            <rect x="52" y="70" width="4" height="4"/>
            <rect x="60" y="74" width="4" height="4"/>
          </g>
        </svg>
        <div class="qr-micro-badge">
          <img id="microChainBadge" src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/arbitrum/info/logo.png" alt="Arbitrum">
        </div>
      </div>

      <!-- Address (Click to Copy) -->
      <div class="address-micro" onclick="copyMicroAddress(this)">0xd6F1...332a</div>
      <div class="copy-hint">Click to copy</div>
    </div>
  </div>

  <script>
    function copyMicroAddress(el) {
      navigator.clipboard.writeText('0xd6F17524421aD97e5933F5192942c3A8D332a1234');
      const original = el.textContent;
      el.textContent = 'Copied!';
      el.classList.add('copied');
      setTimeout(() => {
        el.textContent = original;
        el.classList.remove('copied');
      }, 2000);
    }

    function toggleMicroDropdown(e) {
      e.stopPropagation();
      const dropdown = document.getElementById('microChainDropdown');
      const selector = document.querySelector('.chain-selector-micro');
      dropdown.classList.toggle('active');
      selector.classList.toggle('open');
    }

    function selectMicroChain(e, chainName, iconUrl) {
      e.stopPropagation();
      
      // Update selector
      document.getElementById('microChainIcon').src = iconUrl;
      document.getElementById('microChainIcon').alt = chainName;
      document.getElementById('microChainName').textContent = chainName;
      
      // Update selected state
      document.querySelectorAll('.chain-option-micro').forEach(opt => opt.classList.remove('selected'));
      e.currentTarget.classList.add('selected');
      
      // Close dropdown
      document.getElementById('microChainDropdown').classList.remove('active');
      document.querySelector('.chain-selector-micro').classList.remove('open');
      
      // Update QR badge
      const badge = document.getElementById('microChainBadge');
      if (badge) {
        badge.src = iconUrl;
        badge.alt = chainName;
      }
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
      const dropdown = document.getElementById('microChainDropdown');
      const selector = document.querySelector('.chain-selector-micro');
      
      if (selector && !selector.contains(e.target)) {
        dropdown.classList.remove('active');
        selector.classList.remove('open');
      }
    });
  </script>
</body>
</html>
